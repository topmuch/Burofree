version: '3.8'
services:
  app:
    build: .
    environment:
      - DATABASE_URL=postgresql://burozen:${DB_PASSWORD}@db:5432/burozen
      - NEXTAUTH_URL=https://${DOMAIN}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - AZURE_AD_CLIENT_ID=${AZURE_AD_CLIENT_ID}
      - AZURE_AD_CLIENT_SECRET=${AZURE_AD_CLIENT_SECRET}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - NEXT_PUBLIC_GOOGLE_CONFIGURED=${NEXT_PUBLIC_GOOGLE_CONFIGURED:-false}
      - NEXT_PUBLIC_MICROSOFT_CONFIGURED=${NEXT_PUBLIC_MICROSOFT_CONFIGURED:-false}
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - burozen-network

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: burozen
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: burozen
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U burozen"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - burozen-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - app
    restart: always
    networks:
      - burozen-network

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - burozen-network

networks:
  burozen-network:
    driver: bridge

volumes:
  postgres_data:
